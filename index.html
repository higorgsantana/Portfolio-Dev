<!DOCTYPE html>
<html lang="pt-BR">

<head>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link rel="stylesheet" href="/styles/index.css">
  <link
    href="https://fonts.googleapis.com/css2?family=Asap:ital,wght@0,100..900;1,100..900&family=Inconsolata:wght@200..900&family=Maven+Pro:wght@400..900&display=swap"
    rel="stylesheet">
  <title>Portfólio Dev</title>
</head>

<body>
  <header id="intro">
    <div class="intro-content">
      <div class="avatar-box">
        <img class="avatar" src="./assets/images/Avatar.jpg" alt="Avatar">
        <img class="avatar-icon" src="./assets/icons/Vector.svg" alt="Icone </>">
      </div>
      <p class="intro-top">Hello World! Meu nome é <span class="red">Higor Guilherme</span> e sou</p>
      <h1>Desenvolvedor Fullstack</h1>
      <p class="intro-description">Transformo ideias em aplicações reais e funcionais, unindo lógica de back-end com interfaces modernas no front-end para criar soluções eficientes, escaláveis e bem estruturadas.</p>
      <div class="badges">
        <div class="badge javascript">
          <img src="./assets/icons/JavaScript.svg" alt="JavaScript">
          <p>JavaScript</p>
        </div>
        <div class="badge typescript">
          <img src="./assets/icons/typescript.svg" alt="Typescript">
          <p>Typescript</p>
        </div>
        <div class="badge react">
          <img src="./assets/icons/React.svg" alt="React">
          <p>React</p>
        </div>
        <div class="badge next">
          <img src="./assets/icons/nextdotjs.svg" alt="Next.js">
          <p>Next.js</p>
        </div>
        <div class="badge node">
          <img src="./assets/icons/Node.js.svg" alt="Node.js">
          <p>Node.js</p>
        </div>
      </div>
      <img class="arrow" src="./assets/icons/CaretDoubleDown.svg" alt="Scroll down">
    </div>
  </header>
</body>

</html>
